# Real inner-loop generation with the OpenAI Responses API (gpt-5-mini).
# Requires OPENAI_API_KEY in the environment and `pip install openai`.
# Strategy proposal is still mock/static in V1 (no strategy-generation API call).
name: blackbox_openai

task:
  name: toy_blackbox
  params:
    dim: 6
    low: -5.12
    high: 5.12
    target: 0.0

engine:
  budget_T: 12       # keep small: every inner iteration is one API call
  window_W: 4
  tau: 0.05
  seed: 7

strategy:
  id: exploit_local
  name: Exploit (local refine, best parent)
  parent_selection: best
  operator_weights:
    local_refine: 0.85
    structural_variation: 0.12
    free_form: 0.03
  num_inspirations: 1
  inspiration_selection: best
  exploration: 0.15
  notes: Tight exploitation around the incumbent best.

llm:
  mode: openai
  model: gpt-5-mini
  reasoning_effort: minimal   # low-cost default
  verbosity: low              # concise output
  max_output_tokens: 512

output:
  dir: runs
