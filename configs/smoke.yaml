# Tiny end-to-end smoke config. Runs in well under a second, no API keys.
name: smoke

task:
  name: toy_blackbox
  params:
    dim: 4
    low: -5.12
    high: 5.12
    target: 0.0

engine:
  budget_T: 8        # total inner iterations
  window_W: 2        # outer-loop window size
  tau: 0.5           # high threshold -> windows stagnate -> forces a switch
  seed: 1

# Initial active strategy S0
strategy:
  id: exploit_local
  name: Exploit (local refine, best parent)
  parent_selection: best
  operator_weights:
    local_refine: 0.85
    structural_variation: 0.12
    free_form: 0.03
  num_inspirations: 1
  inspiration_selection: best
  exploration: 0.15
  notes: Tight exploitation around the incumbent best.

llm:
  mode: mock

output:
  dir: runs
